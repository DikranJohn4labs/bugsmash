<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bug Smash</title>
    <link rel="stylesheet" href="src/style.css">
        <script src="src/script.js"></script>
</head>
<body>
    <h1>Bug Smash</h1>
    <p>Score: <span id="score">20</span></p>
    <p>Time: <span id="timer">90</span></p>
    <button id="startBtn">Start Game</button>

    <div id="gameContainer"></div>

    <audio id="bgMusic" loop>
        <source src="sounds/background.mp3" type="audio/mp3">
    </audio>
    <audio id="smashSound">
        <source src="sounds/smash.mp3" type="audio/mp3">
    </audio>
    <audio id="endGameSound">
        <source src="sounds/endgame.mp3" type="audio/mp3">
    </audio>


</body>
</html>
